    <style>
      @font-face {
        font-family: 'Sakkal Majalla';
        src: url('/fonts/majalla.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      /* Sakkal Majalla is a standard system font on many OSs for Arabic/English. 
         If not present, it falls back to Inter or sans-serif */
      * { 
        font-family: 'Sakkal Majalla', 'Inter', sans-serif !important; 
      }

      /* Global sleek scrollbar for Chrome/Safari compatibility */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(156, 163, 175, 0.5); /* Tailwind gray-400 */
        border-radius: 20px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(107, 114, 128, 0.8); /* Tailwind gray-500 */
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Houbara Icon Dark Mode Adjustments */
      .houbara-auto {
        mix-blend-mode: multiply;
      }
      .dark .houbara-auto {
        filter: invert(1);
        mix-blend-mode: screen !important;
      }
      .houbara-white {
        filter: invert(1) brightness(2);
        mix-blend-mode: screen !important;
      }
    </style>
